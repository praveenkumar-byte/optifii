# Redis configuration for vote-app

# Network
bind 0.0.0.0
port 6379
protected-mode no

# Persistence
save 60 1
save 300 10
dbfilename dump.rdb
dir /data

# Logging
loglevel notice
logfile ""

# Memory
maxmemory 128mb
maxmemory-policy allkeys-lru

# Performance
tcp-keepalive 300
timeout 0

# Append-only file (AOF) for durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
