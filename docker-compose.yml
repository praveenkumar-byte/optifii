version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Voting App — Full Stack docker-compose
# Services: vote | worker | result | redis | db
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 1. Vote Service ────────────────────────────────────────────────────────
  vote:
    build:
      context: ./vote-service
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPTION_A: Cats
      OPTION_B: Dogs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ── 2. Result Service ──────────────────────────────────────────────────────
  result:
    build:
      context: ./result-service
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: votes
      DB_USER: postgres
      DB_PASSWORD: postgres
      POLL_INTERVAL: 1000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ── 3. Worker Service ──────────────────────────────────────────────────────
  worker:
    build:
      context: ./worker-service
      dockerfile: Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: votes
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ── 4. Redis Service ───────────────────────────────────────────────────────
  redis:
    build:
      context: ./redis-service
      dockerfile: Dockerfile
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M

  # ── 5. DB Service ──────────────────────────────────────────────────────────
  db:
    build:
      context: ./db-service
      dockerfile: Dockerfile
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: votes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d votes"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  redis-data:
    driver: local
  db-data:
    driver: local
