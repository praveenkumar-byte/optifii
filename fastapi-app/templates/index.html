<!DOCTYPE html>
<html>
<head>
    <title>DevSecOps Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container text-center mt-5">

    <h1 class="text-success">🚀 FastAPI CI/CD Dashboard</h1>

    <div class="card bg-secondary mt-4 p-4">
        <h3>Application Status</h3>
        <p class="text-warning">Deployed via Jenkins Pipeline</p>
    </div>

    <div class="mt-4">
        <button class="btn btn-success" onclick="fetchMessage()">Check API</button>
        <h4 id="output" class="mt-3"></h4>
    </div>

</div>

<script>
function fetchMessage() {
    fetch('/')
    .then(res => res.json())
    .then(data => {
        document.getElementById("output").innerText = data.message;
    });
}
</script>

</body>
</html>
